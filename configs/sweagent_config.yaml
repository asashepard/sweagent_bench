# SWE-agent configuration for sweagent-bench.
#
# This file is NOT passed via --config by default.
# SWE-agent >= 0.7 uses Hydra-based config; the CLI flags in
# sweagent_runner.py set model.name, model.per_instance_cost_limit,
# actions.apply_patch_locally, data_path, traj_dir, etc.
#
# The default SWE-agent tool set (bash + file_editor) is exactly
# what we want. Override here only if you need custom behavior.
#
# To use this file, pass: --config configs/sweagent_config.yaml
# (but verify it matches your SWE-agent version's schema first).
#
# Reference for SWE-agent >= 0.7 config keys:
#   model:
#     name: Qwen/Qwen3.5-35B
#     per_instance_cost_limit: 0
#   actions:
#     apply_patch_locally: true
#   data_path: princeton-nlp/SWE-bench_Verified
#   traj_dir: artifacts/preds/<exp_id>/<condition>/trajectories
